name: Ada AFL++ Fuzzing Pipeline (Universal)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install GNAT, AFL++ and Dependencies
      run: |
        sudo apt update
        sudo apt install -y gnat gnat-13 gcc afl++ python3

    - name: Generate Harness Automatically
      run: |
        echo "🔍 Scanning src/ for exported Ada functions..."
        python3 scripts/generate_harness.py
        echo ""
        echo " Generated files:"
        ls -la harness.c Makefile testcases/ 2>/dev/null || echo "ERROR: Generation failed!"

    - name: Build Fuzzing Target
      run: |
        make clean
        make
        chmod +x fuzz_target
        ls -la fuzz_target
        
        # Quick test
        echo " Testing with seed..."
        timeout 3 ./fuzz_target testcases/*_seed.bin 2>&1 || echo "Test completed (exit code: $?)"

    - name: Run AFL++ Fuzzer
      run: |
        # Configure core pattern for AFL++
        echo core | sudo tee /proc/sys/kernel/core_pattern
        
        mkdir -p findings
        echo "🚀 Starting AFL++ for 120 seconds..."
        timeout 120s afl-fuzz -i testcases/ -o findings/ -V 100 -- ./fuzz_target @@ || true
        echo "🔍 AFL++ finished, checking results..."

    - name: Check for Crashes
      id: check_crashes
      run: |
        echo "📊 Checking findings directory..."
        ls -la findings/default/crashes/ 2>/dev/null || true
        
        if [ -n "$(ls findings/default/crashes/ 2>/dev/null)" ]; then
          echo " CRASH DETECTED! AFL++ found a vulnerability."
          echo "crash_found=true" >> $GITHUB_OUTPUT
          
          echo " Crash files found:"
          for f in findings/default/crashes/*; do
            echo "  - $(basename "$f"): $(wc -c < "$f") bytes"
            echo "    Content (hex): $(xxd -p "$f" | head -c 40)"
          done
          exit 1
        else
          echo "✅ No crashes found within time limit."
          echo "crash_found=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload Crash Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: afl-crash-findings
        path: findings/
        retention-days: 30

    - name: Upload Generated Harness
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-harness
        path: |
          harness.c
          Makefile
          testcases/
        retention-days: 7
