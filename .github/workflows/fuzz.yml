name: Ada AFL++ Fuzzing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install GNAT, AFL++ and Dependencies
      run: |
        sudo apt update
        sudo apt install -y gnat gnat-13 gcc afl++

    - name: Build Fuzzing Target
      run: |
        # Компилируем Ada код
        gnatmake -c src/vulnerable_parser.adb -O2
        
        # Компилируем C harness с AFL++
        afl-gcc -c harness.c -o harness.o
        
        # Линкуем
        gcc -no-pie -o fuzz_target harness.o vulnerable_parser.o -lgnarl -lgnat -lm -lpthread -ldl
        
        # Делаем исполняемым
        chmod +x fuzz_target
        ls -la fuzz_target
        
        # Тестируем с правильным seed (должен упасть!)
        echo -n "X" > test_seed.txt
        timeout 5 ./fuzz_target test_seed.txt || echo "✅ Program crashed as expected with exit code $?"

    - name: Run AFL++ Fuzzer
      run: |
        mkdir -p testcases findings
        
        # Правильный seed - буква X, которая триггерит уязвимость
        echo -n "X" > testcases/seed.txt
        
        echo "🚀 Starting AFL++ for 120 seconds..."
        timeout 120s afl-fuzz -i testcases/ -o findings/ -V 100 -- ./fuzz_target @@ || true
        
        echo " AFL++ finished, checking results..."

    - name: Check for Crashes
      id: check_crashes
      run: |
        echo " Checking findings directory..."
        ls -la findings/ || true
        ls -la findings/default/crashes/ 2>/dev/null || true
        ls -la findings/crashes/ 2>/dev/null || true
        
        if [ -n "$(ls findings/default/crashes/ 2>/dev/null)" ] || [ -n "$(ls findings/crashes/ 2>/dev/null)" ]; then
          echo " CRASH DETECTED! AFL++ found a vulnerability."
          echo "crash_found=true" >> $GITHUB_OUTPUT
          cat findings/default/crashes/* 2>/dev/null | head -c 100 || cat findings/crashes/* 2>/dev/null | head -c 100
          exit 1
        else
          echo "✅ No crashes found within time limit."
          echo "crash_found=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload Crash Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: afl-crash-findings
        path: findings/
        retention-days: 30
